<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pokémarket - Product</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>

<!-- HERO -->
<section class="hero">
    <div class="hero-overlay"></div>

    <header class="top-header">
        <div class="header-inner">
            <div class="logo">
                <a href="/" class="logo-link">
                    <h1>Pokémarket</h1>
                    <p>Samla. Köp. Lev. hej hej</p>
                </a>
            </div>

            <button class="login-btn">Log in</button>
        </div>
        <div class="basket-inner">
            <div></div> <!--ta bort plsss lös på ett bättre sätt-->
            <button class="basket-btn">Basket</button>
            <div class="basket-banner">
                <button class="close-btn">Close</button>
                <h3>Your Basket</h3> 
                <div id="shopping_basket"> </div>
                <button class="buy-btn" style="display:none" onclick="buyOrder()">Buy</button>
            </div>
        </div>
    </header>

    <nav class="category-nav">
        <button class="active">Product</button>
    </nav>
</section>

<!-- MAIN -->
<main class="container">

    <section class="product-page">
        <div class="product-image">
            <img id="product-img" src="" alt="">
        </div>

        <div class="product-info">
            <h2 id="product-name"></h2>

            <p class="product-desc" id="product-desc"></p>

            <p class="price" id="product-price"></p>

            <div class="quantity">
                <label for="qty">Quantity:</label>
                <input type="number" id="qty" value="1" min="1">
            </div>

            <button class="add-cart-btn">Add to Basket</button>
        </div>
    </section>

    <section class="reviews-container">
        <h1>Reviews</h1>
        <div id="review-div">
        </div>
    </section>

</main>

<script src="/functions.js"></script>
<script> // --- Cart functionality ---
let cart = [];

// --- Fetch product data dynamically ---
document.addEventListener('DOMContentLoaded', () => {
    const productId = window.location.pathname.split("/").pop();
    const loginBtn = document.querySelector('.login-btn');
    const addBtn = document.querySelector('.add-cart-btn');
    document.querySelector('#qty').addEventListener('input', () => {
        qtyInput = parseInt(document.getElementById("qty").value);
        if (qtyInput < 1) {
            document.getElementById("qty").value = 1;
        }
    });
    addBtn.addEventListener('click', () => {
        const quantity = parseInt(document.getElementById("qty").value);
        addToCart(productId, quantity);
    });
    fetch('/api/me')
        .then(res => res.json())
        .then(data => {
            console.log('Login state:', data);

            if (data.logged_in) {
                loginBtn.textContent = 'Min profil';
                loginBtn.onclick = () => {
                    window.location.href = `/profile`;
                };
            } else {
                loginBtn.textContent = 'Logga in';
                loginBtn.onclick = () => {
                    window.location.href = `/login`;
                };
            }
        })
        .catch(err => {
            console.error('ME error:', err);
            loginBtn.textContent = 'Logga in';
        });
    fetch(`/api/products/${productId}`)
        .then(res => {
            if (!res.ok) throw new Error("Product not found");
            return res.json();
        })
        .then(product => {
            // Replace "200w" with "400w" in image URL
            const highResImageUrl = product.image_url ? product.image_url.replace('200w', '400w') : '';

            document.getElementById("product-img").src = highResImageUrl;
            document.getElementById("product-img").alt = product.name;
            document.getElementById("product-name").textContent = product.name;
            document.getElementById("product-desc").textContent = product.ext_attack1 || "No description available.";
            document.getElementById("product-price").textContent = parseFloat(product.price || 0).toFixed(2);
            fetch('/api/me').then(res => res.json()).then(data => {
                console.log('data')
                console.log(data)
                console.log(data.logged_in && (data.user.role === 'Admin' || data.user.role === 'Owner'))
                if (data.logged_in && (data.user.role === 'Admin' || data.user.role === 'Owner')) {
                    console.log('We should edit')
                    makeEditable('product-name', 'name', productId);
                    makeEditable('product-desc', 'description', productId);
                    makeEditable('product-price', 'price', productId);
                    const deleteBtn = document.createElement('button');
                    deleteBtn.textContent = 'Make unavailable';
                    deleteBtn.className = 'action-btn ban';
                    deleteBtn.onclick = async () => {
                        if (!confirm('Are you sure you want to make this product unavailable?')) return;
                        await deleteProduct(productId);
                        window.location.href = '/';
                    };
                    document.querySelector('.product-info').appendChild(deleteBtn);
                }
            });
        })
        .catch(err => {
            console.error(err);
            document.querySelector(".product-page").innerHTML = "<p>Product not found.</p>";
    });

   showReviews(productId);
});

document.querySelector('.login-btn').addEventListener('click', ()=> {
    window.location.href = '/login';
});

document.querySelector('.basket-btn').addEventListener('click', () => {
    const banner = document.querySelector('.basket-banner');
    banner.classList.add('active');
    console.log("fjdhjhsjhfffff");
    renderCart();
});

document.querySelector('.close-btn').addEventListener('click', (e) => {
    if (e.target.classList.contains('close-btn')) {
        const banner = document.querySelector('.basket-banner');
        banner.classList.remove('active');
    }
});
</script>
<script src="/functions.js"></script>
</body>
</html>
